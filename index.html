<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Pronunciation Checker (US Accent)</title>
    <style>
        :root {
            --primary: #4a6fa5;
            --secondary: #13c2c2;
            --success: #52c41a;
            --warning: #faad14;
            --danger: #f5222d;
            --dark: #262626;
            --light: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 5px;
        }

        .subtitle {
            color: #8c8c8c;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .card {
            background: #fafafa;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-nav {
            background-color: #e8e8e8;
            color: var(--dark);
        }

        .btn-nav:hover {
            background-color: #d9d9d9;
        }

        .btn-action {
            background-color: var(--primary);
            color: white;
            font-size: 18px;
            padding: 15px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(74, 111, 165, 0.3);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(74, 111, 165, 0.4);
        }

        .btn-listen {
            background-color: var(--secondary);
            color: white;
            margin-right: 10px;
        }

        .recording {
            background-color: var(--danger) !important;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        .score {
            font-size: 48px;
            font-weight: 800;
            margin: 10px 0;
        }

        .transcript {
            font-style: italic;
            color: #595959;
            margin-top: 10px;
        }

        .feedback {
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Phát Âm Tiếng Anh</h1>
    <div class="subtitle">Sử dụng Google Speech Engine (Chuẩn giọng Mỹ en-US)</div>

    <div class="navigation">
        <button class="btn-nav" id="prevBtn" onclick="changeSentence(-1)">◀ Câu trước</button>
        <span id="progress" style="align-self: center; font-weight: bold;">1 / 5</span>
        <button class="btn-nav" id="nextBtn" onclick="changeSentence(1)">Câu tiếp ▶</button>
    </div>

    <div class="card" id="targetSentence">Loading...</div>

    <div style="margin-top: 20px;">
        <button class="btn-action btn-listen" onclick="speakSample()">🔊 Nghe mẫu</button>
        <button class="btn-action" id="recordBtn" onclick="toggleRecording()">🎤 Bắt đầu nói</button>
    </div>

    <div class="result-box" id="resultBox">
        <div class="feedback" id="feedbackText">Tuyệt vời!</div>
        <div class="score" id="scoreNumber">0%</div>
        <div class="transcript">Bạn đã nói: "<span id="userSpeech">...</span>"</div>
    </div>
</div>

<script>
    // Danh sách các câu mẫu để luyện tập phát âm từ dễ đến khó
    const sentences = [
        "Hello, how are you doing today?",
        "The quick brown fox jumps over the lazy dog.",
        "Practice makes perfect, so keep trying every day.",
        "Beautiful weather we are having this morning.",
        "What time do you think you will arrive at the station?",
        "Success is not final, failure is not fatal.",
        "Peter Piper picked a peck of pickled peppers."
    ];

    let currentIndex = 0;
    let isRecording = false;
    let recognition;

    const targetSentenceEl = document.getElementById('targetSentence');
    const progressEl = document.getElementById('progress');
    const recordBtn = document.getElementById('recordBtn');
    const resultBox = document.getElementById('resultBox');
    const feedbackText = document.getElementById('feedbackText');
    const scoreNumber = document.getElementById('scoreNumber');
    const userSpeechEl = document.getElementById('userSpeech');

    // Khởi tạo ứng dụng
    function initApp() {
        // Cập nhật câu hiện tại
        targetSentenceEl.innerText = sentences[currentIndex];
        progressEl.innerText = `${currentIndex + 1} / ${sentences.length}`;
        resultBox.style.display = 'none';
        
        // Khởi tạo Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Trình duyệt của bạn không hỗ trợ nhận diện giọng nói. Vui lòng sử dụng Google Chrome hoặc Microsoft Edge.");
            return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // Thiết lập nhận diện chuẩn giọng Mỹ
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        // Xử lý khi có kết quả trả về từ Google
        recognition.onresult = (event) => {
            const result = event.results[0][0];
            const transcript = result.transcript;
            const confidence = result.confidence; // Độ tự tin của Google (từ 0 đến 1)

            calculateScore(transcript, confidence);
        };

        recognition.onerror = (event) => {
            console.error(event.error);
            stopRecordingState();
            if(event.error === 'not-allowed') {
                alert('Vui lòng cấp quyền truy cập Microphone để ứng dụng hoạt động.');
            }
        };

        recognition.onend = () => {
            stopRecordingState();
        };
    }

    // Chuyển đổi câu hỏi
    function changeSentence(direction) {
        currentIndex += direction;
        if (currentIndex < 0) currentIndex = sentences.length - 1;
        if (currentIndex >= sentences.length) currentIndex = 0;
        initApp();
    }

    // Nghe phát âm mẫu (Sử dụng Web Speech Synthesis chuẩn Mỹ)
    function speakSample() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // Dừng các phát âm cũ nếu có
            const utterance = new SpeechSynthesisUtterance(sentences[currentIndex]);
            utterance.lang = 'en-US'; // Giọng Mỹ
            
            // Tìm giọng đọc tiếng Anh Mỹ tự nhiên nếu có sẵn trên máy
            const voices = window.speechSynthesis.getVoices();
            const usVoice = voices.find(voice => voice.lang === 'en-US' || voice.lang === 'en_US');
            if (usVoice) utterance.voice = usVoice;

            window.speechSynthesis.speak(utterance);
        } else {
            alert("Trình duyệt không hỗ trợ tính năng phát âm mẫu.");
        }
    }

    // Bật/Tắt ghi âm
    function toggleRecording() {
        if (!recognition) return;
        
        if (isRecording) {
            recognition.stop();
            stopRecordingState();
        } else {
            resultBox.style.display = 'none';
            recognition.start();
            isRecording = true;
            recordBtn.innerText = "🛑 Đang nghe... Nói đi";
            recordBtn.classList.add('recording');
        }
    }

    function stopRecordingState() {
        isRecording = false;
        recordBtn.innerText = "🎤 Bắt đầu nói";
        recordBtn.classList.remove('recording');
    }

    // Thuật toán chuẩn hóa chuỗi để so sánh văn bản
    function cleanText(text) {
        return text.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,"").trim();
    }

    // Tính toán điểm số dựa trên văn bản nhận diện và độ tự tin của Google
    function calculateScore(userText, confidence) {
        const targetText = sentences[currentIndex];
        const cleanTarget = cleanText(targetText);
        const cleanUser = cleanText(userText);

        userSpeechEl.innerText = userText;
        resultBox.style.display = 'block';

        // 1. So sánh độ trùng khớp từ ngữ cơ bản
        const targetWords = cleanTarget.split(' ');
        const userWords = cleanUser.split(' ');
        
        let matchedWords = 0;
        targetWords.forEach(word => {
            if (userWords.includes(word)) {
                matchedWords++;
            }
        });

        const wordMatchRatio = matchedWords / targetWords.length;

        // 2. Tính điểm tổng hợp (Kết hợp độ chính xác từ ngữ và độ tự tin âm học của Google)
        // Nếu nói đúng từ nhưng phát âm hơi lệch, điểm confidence của Google sẽ thấp xuống.
        let finalScore = (wordMatchRatio * 0.6) + (confidence * 0.4);
        
        // Chuyển sang thang điểm 100%
        let displayScore = Math.round(finalScore * 100);
        
        // Giới hạn nếu người dùng nói quá hoàn hảo hoặc lệch quá nhiều từ
        if (cleanTarget === cleanUser && displayScore < 90) displayScore = 95;
        if (wordMatchRatio === 0) displayScore = 0;

        scoreNumber.innerText = displayScore + "%";

        // Gợi ý nhận xét dựa trên điểm số
        if (displayScore >= 85) {
            feedbackText.innerText = "🌟 Tuyệt vời! Phát âm chuẩn Mỹ!";
            feedbackText.style.color = 'var(--success)';
            resultBox.style.backgroundColor = '#f6ffed';
            resultBox.style.border = '1px solid #b7eb8f';
        } else if (displayScore >= 60) {
            feedbackText.innerText = "👍 Khá tốt! Cần chú ý nhấn nhá thêm.";
            feedbackText.style.color = 'var(--warning)';
            resultBox.style.backgroundColor = '#fffbe6';
            resultBox.style.border = '1px solid #ffe58f';
        } else {
            feedbackText.innerText = "❌ Chưa chính xác! Hãy nghe mẫu và thử lại nhé.";
            feedbackText.style.color = 'var(--danger)';
            resultBox.style.backgroundColor = '#fff1f0';
            resultBox.style.border = '1px solid #ffa39e';
        }
    }

    // Chạy ứng dụng khi load xong trang
    window.onload = () => {
        initApp();
        // Nạp danh sách giọng nói cho phần Phát âm mẫu (hỗ trợ bất đồng bộ trên một số trình duyệt)
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {};
        }
    };
</script>

</body>
</html>
