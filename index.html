<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Word Diner - Học Từ Vựng Tiếng Anh</title>
    <style>
        :root {
            --primary-color: #e67e22;
            --secondary-color: #2c3e50;
            --bg-color: #f5f6fa;
            --card-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: var(--card-color);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            border: 4px solid var(--primary-color);
        }

        h1 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background-color: #f8f9fa;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .diner-scene {
            background: #ffeaa7;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-left: 5px solid #fdcb6e;
        }

        .guest-bubble {
            font-size: 1.1rem;
            color: #2d3436;
            font-style: italic;
            line-height: 1.5;
        }

        .part-of-speech {
            display: inline-block;
            background: var(--secondary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .input-area {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px 20px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            text-align: center;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-serve {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-skip {
            background-color: #7f8c8d;
            color: white;
        }

        .message {
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 25px;
        }

        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
        .loading { color: #7f8c8d; font-style: italic; }

        .hidden-word {
            letter-spacing: 5px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--secondary-color);
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🍽️ The Word Diner</h1>
    <p style="color: #7f8c8d; margin-bottom: 20px;">Đoán từ vững tiếng Anh để phục vụ thực khách!</p>

    <div class="dashboard">
        <div>Điểm: <span id="score">0</span> 🌟</div>
        <div>Chuỗi thắng: <span id="streak">0</span> 🔥</div>
    </div>

    <div class="diner-scene">
        <div id="loader" class="loading">Một thực khách mới đang vào quán... 🚶‍♂️</div>
        <div id="game-content" style="display: none;">
            <div class="guest-bubble" id="definition">"I want something..."</div>
            <span class="part-of-speech" id="partOfSpeech">Noun</span>
            <div class="hidden-word" id="wordHint">_ _ _ _</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="guestInput" placeholder="Nhập từ tiếng Anh tại đây..." autocomplete="off" disabled>
    </div>

    <div class="btn-group">
        <button class="btn-serve" id="serveBtn" onclick="checkAnswer()" disabled>Phục vụ! 🛎️</button>
        <button class="btn-skip" id="skipBtn" onclick="skipWord()" disabled>Đổi khách 🔄</button>
    </div>

    <div class="message" id="message"></div>
</div>

<script>
    // Danh sách các từ thông dụng để game chọn ngẫu nhiên giải nghĩa từ API
    // (Vì API không có chức năng lấy từ ngẫu nhiên tốt, nên ta tự tạo kho từ để gọi API)
    const wordBank = [
        "apple", "banana", "coffee", "dinner", "kitchen", "family", "journey", "window", 
        "market", "friend", "teacher", "student", "doctor", "hospital", "library", "animal",
        "picture", "garden", "player", "weather", "summer", "winter", "morning", "guitar",
        "shadow", "forest", "palace", "island", "bridge", "village", "camera", "jacket"
    ];

    let currentWord = "";
    let score = 0;
    let streak = 0;

    const loader = document.getElementById("loader");
    const gameContent = document.getElementById("game-content");
    const definitionEl = document.getElementById("definition");
    const partOfSpeechEl = document.getElementById("partOfSpeech");
    const wordHintEl = document.getElementById("wordHint");
    const guestInput = document.getElementById("guestInput");
    const serveBtn = document.getElementById("serveBtn");
    const skipBtn = document.getElementById("skipBtn");
    const messageEl = document.getElementById("message");
    const scoreEl = document.getElementById("score");
    const streakEl = document.getElementById("streak");

    // Khởi động game
    getNewCustomer();

    // Lắng nghe phím Enter
    guestInput.addEventListener("keyup", function(event) {
        if (event.key === "Enter" && !serveBtn.disabled) {
            checkAnswer();
        }
    });

    // Hàm lấy một từ ngẫu nhiên và gọi API dữ liệu
    async function getNewCustomer() {
        // Reset giao diện hiển thị tải
        loader.style.display = "block";
        gameContent.style.display = "none";
        messageEl.textContent = "";
        guestInput.value = "";
        setControlsDisabled(true);

        // Lấy ngẫu nhiên 1 từ trong kho từ
        const randomWord = wordBank[Math.floor(Math.random() * wordBank.length)];
        
        try {
            // Sử dụng Free Dictionary API công khai
            const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${randomWord}`);
            if (!response.ok) throw new Error("Không thể tải từ vựng");
            
            const data = await response.json();
            
            // Phân tích dữ liệu nhận từ API
            currentWord = data[0].word.toLowerCase();
            const meanings = data[0].meanings[0];
            const partOfSpeech = meanings.partOfSpeech;
            const definition = meanings.definitions[0].definition;

            // Hiển thị lên giao diện quán ăn
            definitionEl.textContent = `Thực khách nói: "Tôi muốn một từ có nghĩa là: ${definition}"`;
            partOfSpeechEl.textContent = partOfSpeech;
            
            // Tạo gợi ý dạng dấu gạch dưới (_ _ _ _)
            wordHintEl.textContent = currentWord.replace(/[a-zA-Z]/g, "_ ");

            // Hiển thị nội dung game
            loader.style.display = "none";
            gameContent.style.display = "block";
            setControlsDisabled(false);
            guestInput.focus();

        } catch (error) {
            console.error(error);
            // Nếu lỗi (mạng/API nghẽn), tự động thử lại từ khác
            getNewCustomer();
        }
    }

    // Hàm kiểm tra đáp án của người chơi
    function checkAnswer() {
        const userAns = guestInput.value.trim().toLowerCase();
        
        if (userAns === "") {
            showMessage("Vui lòng nhập món ăn (từ vựng) vào hóa đơn!", "error");
            return;
        }

        if (userAns === currentWord) {
            score += 10;
            streak += 1;
            showMessage(`🎉 Chính xác! Bạn đã phục vụ món "${currentWord.toUpperCase()}" thành công! (+10đ)`, "success");
            updateDashboard();
            setControlsDisabled(true);
            // Đợi 2 giây rồi qua từ mới
            setTimeout(getNewCustomer, 2000);
        } else {
            streak = 0; // Mất chuỗi thắng
            showMessage("❌ Sai món rồi! Thực khách không hài lòng. Hãy thử lại!", "error");
            updateDashboard();
        }
    }

    // Hàm bỏ qua từ hiện tại
    function skipWord() {
        streak = 0;
        updateDashboard();
        showMessage(`Khách đã bỏ đi! Đáp án đúng là: ${currentWord.toUpperCase()}`, "error");
        setControlsDisabled(true);
        setTimeout(getNewCustomer, 2000);
    }

    // Cập nhật điểm số giao diện
    function updateDashboard() {
        scoreEl.textContent = score;
        streakEl.textContent = streak;
    }

    // Hiện thông báo kết quả
    function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = "message " + type;
    }

    // Bật/Tắt các nút bấm khi đang tải dữ liệu
    function setControlsDisabled(status) {
        guestInput.disabled = status;
        serveBtn.disabled = status;
        skipBtn.disabled = status;
    }
</script>

</body>
</html>
