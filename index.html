<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhà Hàng Từ Vựng Tiếng Anh</title>
    <style>
        /* Tạo background bối cảnh quán ăn với khăn trải bàn sọc caro đỏ/trắng */
        body {
            background: 
                repeating-linear-gradient(45deg, #ff9999 25%, transparent 25%, transparent 75%, #ff9999 75%, #ff9999),
                repeating-linear-gradient(45deg, #ff9999 25%, white 25%, white 75%, #ff9999 75%, #ff9999);
            background-position: 0 0, 20px 20px;
            background-size: 40px 40px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tấm bảng order bằng gỗ */
        .restaurant-board {
            background-color: #fff8e7; /* Màu giấy thực đơn */
            border: 12px solid #8b4513; /* Khung gỗ */
            border-radius: 15px;
            padding: 30px 40px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        /* Biểu tượng đầu bếp */
        .chef {
            font-size: 80px;
            margin-top: -80px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        h2 {
            color: #d32f2f;
            margin-bottom: 5px;
        }

        p {
            color: #555;
            font-size: 18px;
        }

        /* Đĩa đựng chữ cái bị đảo lộn */
        .word-plate {
            font-size: 45px;
            letter-spacing: 15px;
            margin: 25px 0;
            padding: 20px;
            background: #ffffff;
            border: 4px dashed #ccc;
            border-radius: 50px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
            color: #1976d2;
            font-weight: bold;
        }

        /* Ô nhập liệu cho bé */
        input {
            font-size: 28px;
            padding: 10px;
            width: 80%;
            border: 4px solid #ffb74d;
            border-radius: 12px;
            text-align: center;
            text-transform: lowercase; /* Tự động hiển thị chữ thường */
            outline: none;
        }

        input:focus {
            border-color: #ff9800;
        }

        /* Các nút bấm */
        .btn-group {
            margin-top: 20px;
        }

        button {
            font-size: 20px;
            padding: 12px 25px;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95); /* Hiệu ứng nhấn nút */
        }

        .btn-serve { background-color: #4CAF50; margin-right: 10px;}
        .btn-serve:hover { background-color: #45a049; }

        .btn-skip { background-color: #2196F3; }
        .btn-skip:hover { background-color: #1976D2; }

        /* Thông báo và điểm số */
        .message {
            font-size: 22px;
            margin-top: 20px;
            font-weight: bold;
            min-height: 30px;
        }

        .score-board {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: #d32f2f;
            font-weight: bold;
            background: rgba(255,255,255,0.8);
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="restaurant-board">
        <div class="score-board">⭐ <span id="scoreVal">0</span></div>
        <div class="chef">👨‍🍳</div>
        <h2>Bếp Trưởng Cần Giúp!</h2>
        <p>Phiếu gọi món bị đảo lộn chữ cái. Bé hãy sắp xếp lại để phục vụ khách nhé!</p>

        <div class="word-plate" id="scrambledWord">...</div>

        <input type="text" id="userInput" placeholder="Nhập từ đúng..." autocomplete="off">
        
        <div class="btn-group">
            <button class="btn-serve" onclick="checkAnswer()">Phục Vụ 🍽️</button>
            <button class="btn-skip" onclick="fetchWord()">Đổi Món ⏭️</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        let currentWord = "";
        let score = 0;

        // Hàm gọi API để lấy từ tiếng Anh ngẫu nhiên
        async function fetchWord() {
            const wordPlate = document.getElementById("scrambledWord");
            const messageEl = document.getElementById("message");
            const inputEl = document.getElementById("userInput");

            wordPlate.innerText = "Đang nấu...";
            messageEl.innerText = "";
            inputEl.value = "";
            inputEl.focus();

            try {
                // Sử dụng Datamuse API: Tìm các từ phổ biến có 3 hoặc 4 chữ cái (phù hợp lớp 1)
                const lengths = ["???", "????"]; 
                const randomLength = lengths[Math.floor(Math.random() * lengths.length)];
                
                // Fetch 100 từ phổ biến nhất có độ dài tương ứng
                const response = await fetch(`https://api.datamuse.com/words?sp=${randomLength}&max=100`);
                const data = await response.json();

                // Chọn ngẫu nhiên 1 từ trong danh sách
                const randomIndex = Math.floor(Math.random() * data.length);
                currentWord = data[randomIndex].word.toLowerCase();

                // Thuật toán đảo lộn chữ cái (Scramble)
                let scrambled = scrambleWord(currentWord);
                
                // Đảm bảo từ đảo lộn không vô tình trùng với từ gốc
                while(scrambled === currentWord && currentWord.length > 1) {
                    scrambled = scrambleWord(currentWord);
                }

                // Hiển thị lên đĩa chữ IN HOA cho bé dễ nhìn
                wordPlate.innerText = scrambled.toUpperCase();
            } catch (error) {
                console.error("Lỗi API:", error);
                wordPlate.innerText = "LỖI";
                messageEl.innerText = "Không thể tải từ. Vui lòng kiểm tra mạng!";
                messageEl.style.color = "red";
            }
        }

        // Hàm xáo trộn chuỗi
        function scrambleWord(word) {
            return word.split('').sort(() => 0.5 - Math.random()).join('');
        }

        // Hàm kiểm tra đáp án của bé
        function checkAnswer() {
            const userGuess = document.getElementById("userInput").value.toLowerCase().trim();
            const messageEl = document.getElementById("message");

            if (!userGuess) return; // Tránh trường hợp bấm nút khi chưa nhập gì

            if (userGuess === currentWord) {
                // Cộng điểm và báo đúng
                score += 1;
                document.getElementById("scoreVal").innerText = score;
                messageEl.style.color = "#4CAF50";
                messageEl.innerText = "Tuyệt vời! Thực khách rất ngon miệng! 🎉";
                
                // Tự động chuyển món mới sau 2 giây
                setTimeout(fetchWord, 2000); 
            } else {
                // Báo sai
                messageEl.style.color = "#d32f2f";
                messageEl.innerText = "Chưa đúng rồi! Bé thử lại nhé. 🧑‍🍳";
            }
        }

        // Hỗ trợ bé nhấn phím Enter để trả lời thay vì dùng chuột click
        document.getElementById("userInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });

        // Bắt đầu trò chơi khi tải xong trang
        window.onload = fetchWord;
    </script>
</body>
</html>
